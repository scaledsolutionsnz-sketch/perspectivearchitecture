<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave a Review | Perspective Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1a18;
      --slate: #2c2f33;
      --stone: #b8a898;
      --warm: #c9b49a;
      --cream: #f5f2ee;
      --white: #ffffff;
      --light: #f0ede9;
      --mid: #8a8480;
      --accent: #8c6d4f;
      --font-head: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
      --trans: 0.3s ease;
    }
    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.4rem 3rem;
      background: var(--white);
      border-bottom: 1px solid rgba(184,168,152,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    .back-link {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color var(--trans);
    }
    .back-link:hover { color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .review-card {
      background: var(--white);
      max-width: 560px;
      width: 100%;
      padding: 3.5rem;
      text-align: center;
      border-top: 3px solid var(--accent);
    }

    .review-hero-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      margin-bottom: 2.5rem;
      display: block;
    }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
      margin-bottom: 0.8rem;
    }
    h1 {
      font-family: var(--font-head);
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 0.8rem;
    }
    h1 em { font-style: italic; color: var(--accent); }
    .sub {
      font-size: 0.92rem;
      color: var(--mid);
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .stars-label {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mid);
      display: block;
      margin-bottom: 1.2rem;
    }

    .stars-row {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .star-btn {
      font-size: 2.8rem;
      color: #d9d0c7;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s ease, transform 0.15s ease;
      line-height: 1;
      padding: 0 0.1rem;
    }
    .star-btn:hover,
    .star-btn.hovered,
    .star-btn.selected { color: #c9934a; transform: scale(1.12); }

    .star-hint {
      font-size: 0.82rem;
      color: var(--mid);
      font-weight: 300;
      height: 1.4rem;
      display: block;
      margin-bottom: 2rem;
      transition: opacity var(--trans);
    }

    .btn-continue {
      width: 100%;
      background: var(--ink);
      color: var(--white);
      border: none;
      padding: 1rem;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--trans);
      opacity: 0.35;
      pointer-events: none;
    }
    .btn-continue.active {
      opacity: 1;
      pointer-events: all;
    }
    .btn-continue.active:hover { background: var(--accent); }

    .privacy-note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--stone);
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--stone);
      border-top: 1px solid rgba(184,168,152,0.2);
    }

    @media (max-width: 600px) {
      header { padding: 1.2rem 1.2rem; }
      .review-card { padding: 2.2rem 1.5rem; }
      .star-btn { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">Perspective <span>Architecture</span></a>
    <a href="index.html" class="back-link">← Back to site</a>
  </header>

  <main>
    <div class="review-card">
      <img
        src="https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=800&q=80&auto=format&fit=crop&crop=top"
        alt="Perspective Architecture projects"
        class="review-hero-img"
      />
      <span class="eyebrow">Client Feedback</span>
      <h1>How Was Your<br><em>Experience?</em></h1>
      <p class="sub">Your feedback helps us improve and helps others find trusted architectural design in Dunedin and Mosgiel.</p>

      <span class="stars-label">Select your rating</span>
      <div class="stars-row" id="starsRow">
        <button class="star-btn" data-val="1" aria-label="1 star">★</button>
        <button class="star-btn" data-val="2" aria-label="2 stars">★</button>
        <button class="star-btn" data-val="3" aria-label="3 stars">★</button>
        <button class="star-btn" data-val="4" aria-label="4 stars">★</button>
        <button class="star-btn" data-val="5" aria-label="5 stars">★</button>
      </div>
      <span class="star-hint" id="starHint"> </span>

      <button class="btn-continue" id="continueBtn">Continue</button>

    </div>
  </main>

  <footer>© 2025 Perspective Architecture Limited · Mosgiel, Dunedin</footer>

  <script>
    const hints = {
      1: "We're sorry to hear that.",
      2: "We appreciate your honesty.",
      3: "Thanks — we'd love to know more.",
      4: "Great to hear!",
      5: "Amazing — thank you so much!"
    };

    const GOOGLE_REVIEW_URL = 'https://www.google.com/search?newwindow=1&sca_esv=6632e39a9fd71d54&rlz=1C5CHFA_enNZ1045NZ1045&sxsrf=ANbL-n7qb_j_KicEE_5GU8Xvc1lEeJm0DA:1776041429053&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOZc-7IWp1zbdaLwJPKoks5w2iinfRDxjqitEaKpNGxIk5Q52glz5OGu-QVpOFE-pMikNU3iayD3AsOgl5jKsgFc6qL_LaPU4MFh1K-ZnoxI4Sk5_2WABCB1V71ZLn-OV5bor1iA%3D&q=Perspective+Architecture+Limited+Reviews&sa=X&ved=2ahUKEwjNvfDzzemTAxXZSWwGHWc-Op8Q0bkNegQIPBAH&biw=1440&bih=812&dpr=2#lrd=0xa82c0324d28983f7:0x17b3e4f7796bfa46,3,,,,';

    let selected = 0;
    const stars = document.querySelectorAll('.star-btn');
    const hint = document.getElementById('starHint');
    const btn = document.getElementById('continueBtn');

    stars.forEach(star => {
      star.addEventListener('mouseenter', () => {
        const val = +star.dataset.val;
        stars.forEach(s => {
          s.classList.toggle('hovered', +s.dataset.val <= val);
        });
        hint.textContent = hints[val];
      });

      star.addEventListener('mouseleave', () => {
        stars.forEach(s => s.classList.remove('hovered'));
        hint.textContent = selected ? hints[selected] : ' ';
      });

      star.addEventListener('click', () => {
        selected = +star.dataset.val;
        stars.forEach(s => {
          s.classList.remove('selected');
          if (+s.dataset.val <= selected) s.classList.add('selected');
        });
        hint.textContent = hints[selected];
        btn.classList.add('active');
      });
    });

    btn.addEventListener('click', () => {
      if (!selected) return;
      if (selected >= 4) {
        window.open(GOOGLE_REVIEW_URL, '_blank');
      } else {
        window.location.href = `private.html?rating=${selected}`;
      }
    });
  </script>
</body>
</html>
